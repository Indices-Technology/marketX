<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">MarketX logo</title>
  <desc id="desc">A coral MarketX shopping bag mark.</desc>
  <defs>
    <linearGradient id="marketx-bg" x1="16" y1="8" x2="84" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FB7185"/>
      <stop offset="0.56" stop-color="#F43F5E"/>
      <stop offset="1" stop-color="#E11D48"/>
    </linearGradient>
    <filter id="marketx-shadow" x="8" y="8" width="80" height="82" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#9F1239" flood-opacity=".24"/>
    </filter>
  </defs>
  <rect width="96" height="96" rx="24" fill="url(#marketx-bg)"/>
  <g filter="url(#marketx-shadow)">
    <rect x="28" y="34" width="40" height="35" rx="5" fill="none" stroke="#fff" stroke-width="5"/>
    <path fill="none" stroke="#fff" stroke-linecap="round" stroke-width="5" d="M38 38v-4a10 10 0 0 1 20 0v4"/>
